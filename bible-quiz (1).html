<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Quiz Challenge 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #1a1a6e; --gold: #FFD700; --orange: #FF6B35;
    --green: #2ECC71; --red: #E74C3C; --card: #ffffff; --purple: #7C3AED;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--sky); min-height:100vh; overflow-x:hidden; }
  body::before { content:'✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦'; position:fixed; top:10px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.1); font-size:22px; letter-spacing:8px; pointer-events:none; z-index:0; }
  .wrapper { max-width:760px; margin:0 auto; padding:20px 16px 60px; position:relative; z-index:1; }

  /* HEADER */
  .header { text-align:center; padding:24px 20px 16px; animation:dropIn 0.7s cubic-bezier(.23,1.2,.5,1) both; }
  .header .crown { font-size:48px; display:block; margin-bottom:4px; animation:bounce 2s infinite; }
  .header h1 { font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,7vw,3rem); color:var(--gold); text-shadow:3px 3px 0 rgba(0,0,0,0.3); line-height:1.1; }
  .header p { color:rgba(255,255,255,0.8); font-size:0.95rem; font-weight:600; margin-top:4px; }

  /* MUSIC TOGGLE */
  .music-btn { position:fixed; top:14px; right:16px; z-index:999; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); color:white; font-size:1.3rem; width:44px; height:44px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; backdrop-filter:blur(4px); }
  .music-btn:hover { background:rgba(255,255,255,0.25); transform:scale(1.1); }

  /* NAME SCREEN */
  .name-screen { background:white; border-radius:24px; padding:36px 28px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,0.3); animation:popIn 0.5s cubic-bezier(.23,1.4,.5,1) both; }
  .name-screen h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--sky); margin-bottom:8px; }
  .name-screen p { color:#666; margin-bottom:20px; font-weight:600; }
  .name-input { border:3px solid #CBD5E0; border-radius:12px; padding:12px 18px; font-family:'Nunito',sans-serif; font-size:1.05rem; font-weight:700; width:100%; outline:none; color:#1a1a2e; background:#F7F9FF; transition:all 0.2s; margin-bottom:16px; }
  .name-input:focus { border-color:var(--purple); box-shadow:0 0 0 4px rgba(124,58,237,0.15); }
  .start-btn { background:linear-gradient(135deg,var(--purple),#4B0082); color:white; border:none; padding:13px 36px; font-family:'Fredoka One',cursive; font-size:1.1rem; border-radius:30px; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.25); transition:all 0.2s; width:100%; }
  .start-btn:hover { transform:translateY(-2px); }

  /* TIMER */
  .timer-wrap { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:14px; }
  .timer-ring { position:relative; width:64px; height:64px; flex-shrink:0; }
  .timer-ring svg { transform:rotate(-90deg); }
  .timer-ring circle { fill:none; stroke-width:6; }
  .timer-bg { stroke:rgba(255,255,255,0.2); }
  .timer-fg { stroke:var(--gold); stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.3rem; color:white; }

  /* PROGRESS */
  .progress-wrap { background:rgba(255,255,255,0.15); border-radius:30px; height:12px; margin:0 0 8px; overflow:hidden; border:2px solid rgba(255,255,255,0.2); }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--orange)); border-radius:30px; transition:width 0.5s ease; }
  .progress-label { display:flex; justify-content:space-between; color:rgba(255,255,255,0.7); font-size:0.8rem; font-weight:700; margin-bottom:14px; }
  .score-badge { display:inline-flex; align-items:center; gap:6px; background:var(--gold); color:#1a1a6e; font-family:'Fredoka One',cursive; font-size:1rem; padding:5px 16px; border-radius:30px; margin-bottom:16px; box-shadow:0 4px 0 rgba(0,0,0,0.2); }

  /* QUESTION */
  .section-header { background:linear-gradient(135deg,var(--purple),#4B0082); border-radius:18px 18px 0 0; padding:12px 20px; display:flex; align-items:center; gap:10px; border:3px solid rgba(255,255,255,0.2); border-bottom:none; }
  .section-header .tag { background:var(--gold); color:#1a1a6e; font-family:'Fredoka One',cursive; font-size:0.75rem; padding:3px 12px; border-radius:20px; text-transform:uppercase; letter-spacing:1px; }
  .section-header h2 { font-family:'Fredoka One',cursive; color:white; font-size:1rem; }
  .question-card { background:var(--card); border-radius:0 0 20px 20px; padding:22px 22px 26px; border:3px solid rgba(255,255,255,0.2); border-top:none; margin-bottom:18px; animation:slideUp 0.4s ease both; box-shadow:0 8px 30px rgba(0,0,0,0.3); }
  .q-number { display:inline-block; background:var(--orange); color:white; font-family:'Fredoka One',cursive; font-size:0.82rem; padding:2px 12px; border-radius:20px; margin-bottom:10px; }
  .question-text { font-size:1rem; font-weight:700; color:#1a1a2e; line-height:1.55; margin-bottom:16px; }
  .blank-input { border:3px solid #CBD5E0; border-radius:12px; padding:10px 16px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; width:100%; outline:none; transition:all 0.2s; color:#1a1a2e; background:#F7F9FF; }
  .blank-input:focus { border-color:var(--purple); box-shadow:0 0 0 4px rgba(124,58,237,0.15); }
  .blank-input.correct { border-color:var(--green); background:#F0FFF4; color:var(--green); }
  .blank-input.wrong { border-color:var(--red); background:#FFF5F5; color:var(--red); }
  .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
  @media(max-width:480px){ .options-grid{ grid-template-columns:1fr; } }
  .option-btn { background:#F7F9FF; border:3px solid #CBD5E0; border-radius:14px; padding:11px 12px; font-family:'Nunito',sans-serif; font-size:0.9rem; font-weight:700; color:#1a1a2e; cursor:pointer; text-align:left; transition:all 0.2s; display:flex; align-items:center; gap:8px; line-height:1.3; }
  .option-btn:hover:not(:disabled){ border-color:var(--purple); background:#EDE9FE; transform:translateY(-2px); }
  .option-btn.correct{ border-color:var(--green); background:#F0FFF4; color:#276749; }
  .option-btn.wrong{ border-color:var(--red); background:#FFF5F5; color:#c0392b; }
  .option-btn:disabled{ cursor:default; transform:none; }
  .opt-letter { width:26px; height:26px; border-radius:50%; background:var(--purple); color:white; font-family:'Fredoka One',cursive; font-size:0.82rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .option-btn.correct .opt-letter{ background:var(--green); }
  .option-btn.wrong .opt-letter{ background:var(--red); }
  .tf-grid{ display:flex; gap:12px; margin-top:4px; }
  .tf-btn{ flex:1; padding:13px; font-family:'Fredoka One',cursive; font-size:1.1rem; border-radius:16px; border:3px solid; cursor:pointer; transition:all 0.2s; text-align:center; }
  .tf-btn.true-btn{ border-color:var(--green); color:var(--green); background:#F0FFF4; }
  .tf-btn.false-btn{ border-color:var(--red); color:var(--red); background:#FFF5F5; }
  .tf-btn.correct{ background:var(--green); color:white; }
  .tf-btn.wrong{ background:var(--red); color:white; }
  .tf-btn:hover:not(:disabled){ transform:scale(1.04); }
  .tf-btn:disabled{ cursor:default; transform:none; }
  .feedback{ margin-top:12px; padding:11px 14px; border-radius:12px; font-weight:700; font-size:0.9rem; display:none; animation:popIn 0.3s cubic-bezier(.23,1.4,.5,1) both; }
  .feedback.show{ display:block; }
  .feedback.correct-fb{ background:#F0FFF4; border:2px solid var(--green); color:#276749; }
  .feedback.wrong-fb{ background:#FFF5F5; border:2px solid var(--red); color:#c0392b; }
  .check-btn{ margin-top:12px; background:linear-gradient(135deg,var(--purple),#4B0082); color:white; border:none; padding:10px 24px; font-family:'Fredoka One',cursive; font-size:0.95rem; border-radius:30px; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.25); transition:all 0.2s; }
  .check-btn:hover{ transform:translateY(-2px); }

  /* TIMEOUT FLASH */
  .timeout-flash { background:#FFF3CD; border:2px solid var(--orange); color:#856404; margin-top:12px; padding:10px 14px; border-radius:12px; font-weight:700; font-size:0.9rem; display:none; }
  .timeout-flash.show { display:block; animation:popIn 0.3s ease both; }

  /* NAV */
  .nav-row{ display:flex; justify-content:space-between; align-items:center; margin-top:16px; gap:12px; }
  .nav-btn{ background:rgba(255,255,255,0.15); color:white; border:2px solid rgba(255,255,255,0.3); padding:9px 20px; font-family:'Fredoka One',cursive; font-size:0.92rem; border-radius:30px; cursor:pointer; transition:all 0.2s; }
  .nav-btn:hover{ background:rgba(255,255,255,0.25); }
  .nav-btn:disabled{ opacity:0.4; cursor:default; }
  .quiz-counter{ color:rgba(255,255,255,0.7); font-weight:700; font-size:0.88rem; }

  /* RESULTS */
  .results-screen{ display:none; text-align:center; background:white; border-radius:24px; padding:36px 24px; box-shadow:0 12px 40px rgba(0,0,0,0.3); animation:popIn 0.5s cubic-bezier(.23,1.4,.5,1) both; }
  .results-screen.show{ display:block; }
  .results-trophy{ font-size:72px; display:block; margin-bottom:8px; animation:bounce 1s infinite; }
  .results-title{ font-family:'Fredoka One',cursive; font-size:2rem; color:var(--sky); margin-bottom:6px; }
  .results-score{ font-family:'Fredoka One',cursive; font-size:3.5rem; color:var(--orange); line-height:1; margin:8px 0; }
  .results-msg{ font-size:1rem; font-weight:700; color:#555; margin-bottom:24px; }
  .result-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .restart-btn{ background:linear-gradient(135deg,var(--orange),#c0392b); color:white; border:none; padding:13px 30px; font-family:'Fredoka One',cursive; font-size:1.1rem; border-radius:30px; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.2); transition:all 0.2s; }
  .leaderboard-btn-res{ background:linear-gradient(135deg,var(--purple),#4B0082); color:white; border:none; padding:13px 30px; font-family:'Fredoka One',cursive; font-size:1.1rem; border-radius:30px; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.2); transition:all 0.2s; }
  .restart-btn:hover,.leaderboard-btn-res:hover{ transform:translateY(-2px); }

  /* LEADERBOARD */
  .leaderboard-screen{ display:none; background:white; border-radius:24px; padding:28px 22px; box-shadow:0 12px 40px rgba(0,0,0,0.3); animation:popIn 0.5s cubic-bezier(.23,1.4,.5,1) both; }
  .leaderboard-screen.show{ display:block; }
  .lb-title{ font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--sky); text-align:center; margin-bottom:18px; }
  .lb-list{ list-style:none; display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
  .lb-item{ display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:14px; background:#F7F9FF; border:2px solid #E2E8F0; }
  .lb-item.me{ border-color:var(--purple); background:#EDE9FE; }
  .lb-rank{ font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--purple); width:32px; text-align:center; }
  .lb-rank.gold{ color:#DAA520; }
  .lb-rank.silver{ color:#A0A0A0; }
  .lb-rank.bronze{ color:#CD7F32; }
  .lb-name{ flex:1; font-weight:800; color:#1a1a2e; font-size:0.95rem; }
  .lb-score{ font-family:'Fredoka One',cursive; color:var(--orange); font-size:1rem; }
  .lb-time{ font-size:0.78rem; color:#999; font-weight:600; }
  .lb-empty{ text-align:center; color:#aaa; font-weight:700; padding:20px; }
  .lb-back{ display:block; width:100%; background:linear-gradient(135deg,var(--sky),#2d2d8e); color:white; border:none; padding:13px; font-family:'Fredoka One',cursive; font-size:1.05rem; border-radius:30px; cursor:pointer; }

  /* ANIMATIONS */
  @keyframes dropIn{ from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:none} }
  @keyframes slideUp{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  @keyframes popIn{ from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
  @keyframes bounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes pulse{ 0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.2)} 50%{box-shadow:0 4px 20px rgba(255,215,0,.5)} }
  @keyframes timerWarn{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
</style>
</head>
<body>

<button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Toggle Music">🎵</button>

<div class="wrapper">
  <div class="header">
    <span class="crown">👑</span>
    <h1>Bible Quiz Challenge</h1>
    <p>Test your Scripture knowledge! ✨ Ages 15 & Under</p>
  </div>

  <!-- NAME SCREEN -->
  <div id="name-screen" class="name-screen">
    <h2>👋 Welcome, Champion!</h2>
    <p>Enter your name to begin the quiz</p>
    <input class="name-input" id="player-name" type="text" placeholder="Your name..." maxlength="20" onkeydown="if(event.key==='Enter') startQuiz()" />
    <button class="start-btn" onclick="startQuiz()">🚀 Start Quiz!</button>
  </div>

  <!-- QUIZ AREA -->
  <div id="quiz-area" style="display:none">
    <div style="display:flex;justify-content:center;margin-bottom:4px;">
      <div class="score-badge">⭐ Score: <span id="score-display">0</span> / <span id="total-display">30</span></div>
    </div>
    <div class="progress-label">
      <span>Question <span id="q-current">1</span> of 30</span>
      <span id="pct-label">0%</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle class="timer-bg" cx="32" cy="32" r="27" />
          <circle class="timer-fg" id="timer-circle" cx="32" cy="32" r="27"
            stroke-dasharray="169.6" stroke-dashoffset="0" />
        </svg>
        <div class="timer-text" id="timer-text">20</div>
      </div>
      <div style="color:rgba(255,255,255,0.7);font-weight:700;font-size:0.85rem;">seconds<br>remaining</div>
    </div>

    <div id="question-container"></div>

    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Back</button>
      <span class="quiz-counter" id="nav-counter">1 / 30</span>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-screen" id="results-screen">
    <span class="results-trophy" id="trophy">🏆</span>
    <div class="results-title" id="result-title">Amazing Job!</div>
    <div class="results-score" id="result-score">0/30</div>
    <div class="results-msg" id="result-msg">Keep studying God's Word!</div>
    <div class="result-actions">
      <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button>
      <button class="leaderboard-btn-res" onclick="showLeaderboard()">🏅 Leaderboard</button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="leaderboard-screen" id="leaderboard-screen">
    <div class="lb-title">🏅 Leaderboard</div>
    <ul class="lb-list" id="lb-list"></ul>
    <button class="lb-back" onclick="hideLeaderboard()">← Back</button>
  </div>
</div>

<script>
// ── AUDIO ENGINE ──────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let musicOn = true, bgNodes = [], bgGain;

function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function playBgMusic(){
  stopBgMusic();
  resumeAC();
  bgGain = AC.createGain(); bgGain.gain.value = 0.18; bgGain.connect(AC.destination);
  const notes = [261,294,329,349,392,440,392,349,329,294];
  notes.forEach((f,i)=>{
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,AC.currentTime+i*0.55);
    g.gain.linearRampToValueAtTime(0.4,AC.currentTime+i*0.55+0.05);
    g.gain.linearRampToValueAtTime(0,AC.currentTime+i*0.55+0.5);
    o.connect(g); g.connect(bgGain);
    o.start(AC.currentTime+i*0.55);
    o.stop(AC.currentTime+i*0.55+0.6);
    bgNodes.push(o);
  });
  setTimeout(()=>{ if(musicOn) playBgMusic(); }, notes.length*550+200);
}

function stopBgMusic(){
  bgNodes.forEach(n=>{ try{n.stop();}catch(e){} });
  bgNodes=[];
}

function playBeep(freq, dur, type='sine', vol=0.3){
  resumeAC();
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime+dur);
}

function playCorrect(){ playBeep(523,0.1); setTimeout(()=>playBeep(659,0.15),100); setTimeout(()=>playBeep(784,0.2),220); }
function playWrong(){ playBeep(200,0.3,'sawtooth',0.2); }
function playTick(){ playBeep(880,0.05,'square',0.08); }
function playUrgent(){ playBeep(440,0.08,'square',0.15); }
function playTimeUp(){ playBeep(150,0.5,'sawtooth',0.25); }

function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('music-btn').textContent=musicOn?'🎵':'🔇';
  if(musicOn) playBgMusic(); else stopBgMusic();
}

// ── QUESTIONS ────────────────────────────────────────────────
const QUESTIONS = [
  { ref:"Revelation 12:11", type:"mcq", question:"In Revelation 12:11, they overcame him by the blood of the ______.", options:["Lamb","Cross","Saviour","Spirit"], correct:0 },
  { ref:"Revelation 12:11", type:"truefalse", question:"Revelation 12:11 says believers overcame by the blood of the Lamb and the word of their testimony.", correct:true },
  { ref:"Deuteronomy 6:7", type:"mcq", question:"Deuteronomy 6:7 says you shall ______ God's commandments diligently to your children.", options:["Read","Teach","Show","Sing"], correct:1 },
  { ref:"Deuteronomy 6:7", type:"truefalse", question:"Deuteronomy 6:7 says we should talk about God's commandments only in church.", correct:false },
  { ref:"Galatians 6:7", type:"mcq", question:"Galatians 6:7 says 'Do not be deceived, God is not ______.'", options:["Sleeping","Late","Mocked","Distant"], correct:2 },
  { ref:"Galatians 6:7", type:"truefalse", question:"Galatians 6:7 says 'Whatever a man sows, that he will also reap.'", correct:true },
  { ref:"Mark 6:7", type:"mcq", question:"In Mark 6:7, Jesus gave the disciples power over ______ spirits.", options:["Evil","Dark","Unclean","Wicked"], correct:2 },
  { ref:"Mark 6:7", type:"truefalse", question:"In Mark 6:7, Jesus sent the disciples out one by one.", correct:false },
  { ref:"Hebrews 6:7", type:"mcq", question:"Hebrews 6:7 compares receiving God's blessing to land that drinks in ______ and produces a useful crop.", options:["Sunlight","Rain","Dew","Wind"], correct:1 },
  { ref:"Revelation 6:7", type:"mcq", question:"In Revelation 6:7, when the fourth seal was opened, John heard the voice of the fourth ______ creature.", options:["Heavenly","Holy","Living","Mighty"], correct:2 },
  { ref:"2 Peter 3:18", type:"mcq", question:"2 Peter 3:18 says to ______ in the grace and knowledge of our Lord and Savior Jesus Christ.", options:["Stand","Rejoice","Grow","Abide"], correct:2 },
  { ref:"2 Peter 3:18", type:"truefalse", question:"2 Peter 3:18 ends with 'To Him be the glory both now and forever. Amen.'", correct:true },
  { ref:"Proverbs 3:5", type:"mcq", question:"Proverbs 3:5 says to trust in the LORD with all your ______.", options:["Strength","Mind","Soul","Heart"], correct:3 },
  { ref:"Proverbs 3:6", type:"mcq", question:"In all your ways ______ God, and He shall direct your paths (Proverbs 3:6).", options:["Fear","Acknowledge","Praise","Serve"], correct:1 },
  { ref:"Proverbs 3:5", type:"truefalse", question:"Proverbs 3:5 tells us to lean on our own understanding.", correct:false },
  { ref:"Proverbs 3:6", type:"truefalse", question:"Proverbs 3:6 promises that if we acknowledge God, He will direct our paths.", correct:true },
  { ref:"Matthew 5:14", type:"mcq", question:"Matthew 5:14 says 'You are the ______ of the world.'", options:["Salt","Hope","Joy","Light"], correct:3 },
  { ref:"Matthew 5:14", type:"mcq", question:"In Matthew 5:14, Jesus says a city set on a ______ cannot be hidden.", options:["Mountain","Hill","Cloud","Rock"], correct:1 },
  { ref:"Matthew 5:14", type:"truefalse", question:"Matthew 5:14 says 'You are the salt of the world.'", correct:false },
  { ref:"1 John 4:8", type:"mcq", question:"In 1 John 4:8, 'He who does not ______ does not know God.'", options:["Pray","Give","Love","Serve"], correct:2 },
  { ref:"1 John 4:8", type:"mcq", question:"1 John 4:8 reveals that God is what?", options:["Power","Light","Love","Truth"], correct:2 },
  { ref:"1 John 4:8", type:"truefalse", question:"According to 1 John 4:8, if someone does not love, they do not know God.", correct:true },
  { ref:"Psalm 46:10", type:"mcq", question:"Psalm 46:10 begins with 'Be ______ and know that I am God.'", options:["Strong","Bold","Still","Glad"], correct:2 },
  { ref:"Psalm 46:10", type:"mcq", question:"Psalm 46:10 says 'I will be exalted among the ______.'", options:["People","Nations","Churches","Mountains"], correct:1 },
  { ref:"Psalm 46:10", type:"truefalse", question:"Psalm 46:10 says 'Be still and know that I am Lord.'", correct:false },
  { ref:"James 1:17", type:"mcq", question:"James 1:17 says every good and perfect gift comes from ______.", options:["Heaven","Above","God alone","The Spirit"], correct:1 },
  { ref:"James 1:17", type:"mcq", question:"James 1:17 calls God the Father of ______.", options:["Angels","Nations","Lights","Children"], correct:2 },
  { ref:"James 1:17", type:"truefalse", question:"James 1:17 says that in God there is no variation or shadow of turning.", correct:true },
  { ref:"2 Peter 3:18", type:"mcq", question:"2 Peter 3:18 says to grow in grace and the ______ of our Lord Jesus Christ.", options:["Power","Knowledge","Love","Peace"], correct:1 },
  { ref:"Revelation 12:11", type:"truefalse", question:"In Revelation 12:11, believers did not love their lives even unto death.", correct:true }
];

// ── STATE ────────────────────────────────────────────────────
let currentQ=0, score=0, playerName='';
let answered=new Array(30).fill(false);
let userCorrect=new Array(30).fill(null);
let timerVal=20, timerInterval=null;
const TIMER_MAX=20, CIRCUMFERENCE=169.6;

// ── LEADERBOARD (localStorage) ───────────────────────────────
function getBoard(){ try{ return JSON.parse(localStorage.getItem('bqLeaderboard')||'[]'); }catch(e){return[];} }
function saveEntry(name,sc){ 
  const b=getBoard(); b.push({name,score:sc,date:new Date().toLocaleDateString()});
  b.sort((a,b)=>b.score-a.score); localStorage.setItem('bqLeaderboard',JSON.stringify(b.slice(0,10))); 
}

// ── START ────────────────────────────────────────────────────
function startQuiz(){
  const n=document.getElementById('player-name').value.trim();
  if(!n){ document.getElementById('player-name').style.borderColor='var(--red)'; return; }
  playerName=n;
  document.getElementById('name-screen').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  resumeAC();
  if(musicOn) playBgMusic();
  renderQuestion(0);
  startTimer();
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer(){
  clearInterval(timerInterval);
  timerVal=TIMER_MAX;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timerVal--;
    updateTimerUI();
    if(timerVal<=5 && timerVal>0) playUrgent();
    else if(timerVal>0 && timerVal<=10) playTick();
    if(timerVal<=0){ clearInterval(timerInterval); timeUp(); }
  },1000);
}

function updateTimerUI(){
  const pct=timerVal/TIMER_MAX;
  const offset=CIRCUMFERENCE*(1-pct);
  const circle=document.getElementById('timer-circle');
  const txt=document.getElementById('timer-text');
  if(!circle) return;
  circle.style.strokeDashoffset=offset;
  txt.textContent=timerVal;
  if(timerVal<=5){ circle.style.stroke='var(--red)'; txt.style.color='var(--red)'; }
  else if(timerVal<=10){ circle.style.stroke='var(--orange)'; txt.style.color='var(--orange)'; }
  else{ circle.style.stroke='var(--gold)'; txt.style.color='white'; }
}

function timeUp(){
  if(answered[currentQ]) return;
  playTimeUp();
  answered[currentQ]=true; userCorrect[currentQ]=false;
  updateScoreDisplay();
  // Show timeout message + reveal answer
  const q=QUESTIONS[currentQ];
  const correctAns=q.type==='mcq'?q.options[q.correct]:(q.correct?'TRUE':'FALSE');
  const fb=document.getElementById(`timeout-${currentQ}`);
  if(fb){ fb.classList.add('show'); fb.innerHTML=`⏰ Time's up! The answer was: <strong>"${correctAns}"</strong>`; }
  disableInputs(currentQ);
  updateProgress();
}

function disableInputs(index){
  const card=document.getElementById('question-container');
  card.querySelectorAll('button,input').forEach(el=>el.disabled=true);
}

function stopTimer(){ clearInterval(timerInterval); }

// ── RENDER ────────────────────────────────────────────────────
function renderQuestion(index){
  const q=QUESTIONS[index];
  const container=document.getElementById('question-container');
  const typeLabel=q.type==='mcq'?'Multiple Choice':'True or False';

  let bodyHtml='';
  if(q.type==='mcq'){
    const letters=['A','B','C','D'];
    const optHtml=q.options.map((o,i)=>{
      let cls='option-btn';
      if(answered[index]){ if(i===q.correct) cls+=' correct'; else if(userCorrect[index]===i&&i!==q.correct) cls+=' wrong'; }
      return `<button class="${cls}" onclick="checkMcq(${index},${i})" ${answered[index]?'disabled':''}>
        <span class="opt-letter">${letters[i]}</span>${o}</button>`;
    }).join('');
    bodyHtml=`<p class="question-text">${q.question}</p><div class="options-grid">${optHtml}</div>`;
  } else {
    let tCls='tf-btn true-btn', fCls='tf-btn false-btn';
    if(answered[index]){
      if(q.correct===true) tCls+=' correct'; else fCls+=' correct';
      if(userCorrect[index]===false&&q.correct===true) fCls+=' wrong';
      if(userCorrect[index]===true&&q.correct===false) tCls+=' wrong';
    }
    bodyHtml=`<p class="question-text">"${q.question}"</p>
      <div class="tf-grid">
        <button class="${tCls}" onclick="checkTF(${index},true)" ${answered[index]?'disabled':''}>✅ TRUE</button>
        <button class="${fCls}" onclick="checkTF(${index},false)" ${answered[index]?'disabled':''}>❌ FALSE</button>
      </div>`;
  }

  const feedbackHtml=answered[index]?buildFeedback(index):`<div class="feedback" id="feedback-${index}"></div>`;
  const timeoutHtml=`<div class="timeout-flash" id="timeout-${index}"></div>`;

  container.innerHTML=`
    <div class="section-header">
      <span class="tag">${typeLabel}</span>
      <h2>📖 ${q.ref}</h2>
    </div>
    <div class="question-card">
      <span class="q-number">Question ${index+1}</span>
      ${bodyHtml}
      ${feedbackHtml}
      ${timeoutHtml}
    </div>`;

  updateProgress();
}

function buildFeedback(index){
  const q=QUESTIONS[index];
  const isCorrect=userCorrect[index]===true||(typeof userCorrect[index]==='number'&&userCorrect[index]===q.correct);
  const correctAns=q.options[q.correct];
  const msg=isCorrect
    ?`🎉 Correct! Well done, Bible Champion!`
    :`😅 Not quite! Answer: <strong>"${correctAns}"</strong>. Keep going! 💪`;
  return `<div class="feedback ${isCorrect?'correct-fb':'wrong-fb'} show">${msg}</div>`;
}

// ── ANSWER CHECKS ─────────────────────────────────────────────
function checkFitb(index){
  if(answered[index]) return;
  const q=QUESTIONS[index];
  const inp=document.getElementById(`fitb-input-${index}`);
  const val=inp.value.trim().toLowerCase();
  const isCorrect=q.answers.some(a=>val===a.toLowerCase()||val.includes(a.toLowerCase()));
  finalize(index,isCorrect,isCorrect);
}
function checkMcq(index,chosen){
  if(answered[index]) return;
  const isCorrect=chosen===QUESTIONS[index].correct;
  userCorrect[index]=chosen;
  finalize(index,isCorrect,null,chosen);
}
function checkTF(index,chosen){
  if(answered[index]) return;
  const isCorrect=chosen===QUESTIONS[index].correct;
  userCorrect[index]=chosen;
  finalize(index,isCorrect,null,chosen);
}
function finalize(index,isCorrect,fitbVal=null,chosenVal=null){
  stopTimer();
  if(fitbVal!==null) userCorrect[index]=fitbVal;
  answered[index]=true;
  if(isCorrect){ score++; playCorrect(); } else playWrong();
  updateScoreDisplay();
  renderQuestion(index);
}

// ── NAVIGATION ────────────────────────────────────────────────
function navigate(dir){
  currentQ+=dir;
  if(currentQ<0){ currentQ=0; return; }
  if(currentQ>=QUESTIONS.length){ showResults(); return; }
  renderQuestion(currentQ);
  if(!answered[currentQ]) startTimer(); else stopTimer();
  document.getElementById('prev-btn').disabled=currentQ===0;
  document.getElementById('next-btn').textContent=currentQ===QUESTIONS.length-1?'Finish 🏁':'Next →';
  document.getElementById('nav-counter').textContent=`${currentQ+1} / ${QUESTIONS.length}`;
  document.getElementById('q-current').textContent=currentQ+1;
}

function updateScoreDisplay(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('total-display').textContent=answered.filter(Boolean).length;
}
function updateProgress(){
  const done=answered.filter(Boolean).length;
  const pct=Math.round((done/QUESTIONS.length)*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('pct-label').textContent=pct+'%';
}

// ── RESULTS ───────────────────────────────────────────────────
function showResults(){
  stopTimer(); stopBgMusic();
  saveEntry(playerName,score);
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('results-screen').classList.add('show');
  const pct=Math.round((score/QUESTIONS.length)*100);
  document.getElementById('result-score').textContent=`${score}/${QUESTIONS.length}`;
  let trophy,title,msg;
  if(pct>=90){trophy='🏆';title='BIBLE CHAMPION!';msg='Outstanding! You really know your Scriptures! 🌟';}
  else if(pct>=75){trophy='🥇';title='Amazing Job!';msg="So impressive! Keep memorising God's Word! ✨";}
  else if(pct>=60){trophy='🥈';title='Great Effort!';msg="You're getting there! Review the scriptures and try again! 📖";}
  else if(pct>=40){trophy='🥉';title='Keep Going!';msg="Don't give up! Every champion starts somewhere. You've got this! 💪";}
  else{trophy='📖';title='Keep Studying!';msg="Spend more time with God's Word — it will change your life! 🙏";}
  document.getElementById('trophy').textContent=trophy;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-msg').textContent=msg;
  playCorrect();
}

// ── LEADERBOARD ───────────────────────────────────────────────
function showLeaderboard(){
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('leaderboard-screen').classList.add('show');
  const board=getBoard();
  const medals=['🥇','🥈','🥉'];
  const rankClass=['gold','silver','bronze'];
  const list=document.getElementById('lb-list');
  if(!board.length){ list.innerHTML='<div class="lb-empty">No scores yet — be the first! 🌟</div>'; return; }
  list.innerHTML=board.map((e,i)=>{
    const isMe=e.name===playerName&&e.score===score;
    const rank=i<3?`<span class="lb-rank ${rankClass[i]}">${medals[i]}</span>`:`<span class="lb-rank">#${i+1}</span>`;
    return `<li class="lb-item${isMe?' me':''}">
      ${rank}
      <span class="lb-name">${e.name}${isMe?' 👈':''}</span>
      <span class="lb-time">${e.date}</span>
      <span class="lb-score">${e.score}/30</span>
    </li>`;
  }).join('');
}
function hideLeaderboard(){
  document.getElementById('leaderboard-screen').classList.remove('show');
  document.getElementById('results-screen').classList.add('show');
}

// ── RESTART ───────────────────────────────────────────────────
function restartQuiz(){
  currentQ=0; score=0;
  answered=new Array(30).fill(false);
  userCorrect=new Array(30).fill(null);
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('name-screen').style.display='block';
  document.getElementById('player-name').value='';
  stopTimer();
}
</script>
</body>
</html>
